<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        background: #0A0C10;
        color: #E7EAF0;
        font-family: "Inter", system-ui, sans-serif;
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        color: #98A2B3;
        letter-spacing: 0.02em;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 92px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        color: #E7EAF0;
      }
      .role {
        font-size: 46px;
        font-weight: 700;
        color: #FBBF24;
        margin-top: 18px;
      }
      .rule {
        position: absolute;
        left: 80px;
        bottom: 118px;
        width: 160px;
        height: 3px;
        background: #FBBF24;
      }
      .domain {
        position: absolute;
        left: 80px;
        bottom: 70px;
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        color: #98A2B3;
      }
    </style>
  </head>
  <body>
    <div class="eyebrow">Detroit, MI — AI Solutions / Forward-Deployed Engineering</div>
    <h1>JONATHON PLUMB</h1>
    <div class="role">AI Solutions Engineer</div>
    <div class="rule"></div>
    <div class="domain">jonplumb.dev</div>
  </body>
</html>
